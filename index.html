<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chromebook Check v1.5</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="card">
    <div class="header">
      <div>
        <h1>Chromebook Check v1.5</h1>
        <div class="sub">スペック解析 / 実機改善版</div>
      </div>
      <div class="pill" id="statusPill">待機</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span id="stepText">Step 0/7</span><span id="stepName">開始</span></div>
      <div class="progress"><div class="bar" id="bar"></div></div>
    </div>
    <div class="stage" id="content"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
