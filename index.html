<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chromebook Check v2.01</title><style>
:root{--bg:#0b1020;--p:#172033;--p2:#0f172a;--l:#41506b;--t:#f8fafc;--m:#cbd5e1;--b:#2563eb;--g:#22c55e;--r:#ef4444;--y:#f59e0b}*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}#app{height:100%;padding:8px}.card{height:100%;background:var(--p);border:1px solid #273449;border-radius:16px;padding:12px;display:flex;flex-direction:column}.head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}h1{font-size:22px;margin:0}h2{font-size:28px;margin:0 0 8px}.sub{color:var(--m);font-size:14px}.pill{padding:8px 12px;border-radius:999px;background:var(--p2);border:1px solid var(--l);font-weight:900}.pi{display:flex;justify-content:space-between;color:var(--m);font-weight:800;font-size:13px;margin-bottom:5px}.prog{height:14px;background:#020617;border:1px solid var(--l);border-radius:999px;overflow:hidden;margin-bottom:10px}.bar{height:100%;background:linear-gradient(90deg,#16a34a,#22c55e)}.content{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}.main{flex:1;min-height:0;overflow:hidden}.foot{flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px solid var(--l);padding-top:8px;margin-top:8px}.btn{border:0;border-radius:13px;padding:12px 18px;margin:4px;font-size:17px;font-weight:900;color:#fff;cursor:pointer}.start{background:var(--b)}.ok{background:var(--g)}.ng{background:var(--r)}.warn{background:var(--y);color:#111827}.big{font-size:42px;font-weight:900;text-align:center;margin:14px 0 6px}.center{text-align:center}.note{background:var(--p2);border:1px solid var(--l);border-radius:13px;padding:12px;margin:10px 0;line-height:1.5}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin:10px 0}.item{background:var(--p2);border:1px solid var(--l);border-radius:13px;padding:10px;min-height:64px}.label{color:var(--m);font-size:12px;font-weight:800;margin-bottom:4px}.value{font-size:18px;font-weight:900;word-break:break-word}details{background:var(--p2);border:1px solid var(--l);border-radius:14px;padding:10px;margin:10px 0}summary{cursor:pointer;font-weight:900}textarea{width:100%;height:86px;background:#020617;color:#e5e7eb;border:1px solid var(--l);border-radius:10px;padding:8px}.diagnostic-url{background:#020617;border:2px dashed #93c5fd;color:#bfdbfe;border-radius:14px;padding:16px;margin:12px 0;font-size:28px;font-weight:900;text-align:center;user-select:all}.simple-kb{background:#020617;border:1px solid var(--l);border-radius:14px;padding:8px;margin-top:10px;overflow:hidden}.simple-row{display:flex;gap:4px;margin-bottom:4px;justify-content:center}.simple-key{min-width:38px;height:32px;border-radius:7px;background:#475569;border:1px solid #64748b;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}.simple-key.done{background:var(--g);color:#052e16}.speaker-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.speaker{background:var(--p2);border:1px solid var(--l);border-radius:14px;padding:18px;min-height:120px}.speaker.active{border-color:var(--g);box-shadow:0 0 0 3px #22c55e44}.tone{font-size:36px;font-weight:900;margin-top:12px}.preview{width:100%;max-height:260px;background:#020617;border:1px solid var(--l);border-radius:14px;margin:10px 0;display:none}.meter{height:34px;background:#020617;border:1px solid var(--l);border-radius:999px;overflow:hidden;margin:16px 0}.meter-bar{height:100%;width:0%;background:var(--g)}.target-area{height:210px;background:#020617;border:1px solid var(--l);border-radius:14px;position:relative;margin:10px 0}.target{position:absolute;right:18px;bottom:18px;width:70px;height:70px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-weight:900}.target.hit{background:var(--g);color:#052e16}.click-area{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.click-box{height:90px;background:#020617;border:2px solid var(--l);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}.click-box.done{background:#14532d;border-color:var(--g);color:#86efac}.fullscreen{position:fixed;inset:0;z-index:1000;display:none;background:#000;color:#fff}.fullscreen.show{display:block}.fs-top{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:center;z-index:2}.fs-title{background:#111827cc;padding:8px 12px;border-radius:10px;font-size:22px;font-weight:900}.fs-body{height:100%;display:flex;align-items:center;justify-content:center;font-size:68px;font-weight:900}.touch-dot{position:absolute;width:112px;height:112px;border-radius:50%;background:var(--b);border:5px solid #93c5fd;display:flex;align-items:center;justify-content:center;font-weight:900;touch-action:none}.touch-dot.hit{background:var(--g);border-color:#86efac;color:#052e16}.tl{left:26px;top:76px}.tr{right:26px;top:76px}.c{left:50%;top:50%;transform:translate(-50%,-50%)}.bl{left:26px;bottom:26px}.br{right:26px;bottom:26px}.pass{color:#86efac}.fail{color:#fca5a5}@media(max-width:760px){h1{font-size:18px}h2{font-size:23px}.big{font-size:34px}.btn{font-size:15px;padding:10px 12px}.diagnostic-url{font-size:22px}.simple-key{min-width:30px;height:30px;font-size:11px}.speaker-box{grid-template-columns:1fr}}
</style></head><body><div id="app"></div><script>
(function(){"use strict";const steps=["開始","診断","スピーカー","カメラ","マイク","液晶＋タッチ","タッチパッド","完了"];let idx=0,results={},cameraStream=null,micStream=null,micCtx=null,cameraDevices=[],cameraIndex=0;function root(){return document.getElementById("app")}function frame(main,foot){const pct=(idx/(steps.length-1))*100;root().innerHTML='<div class="card"><div class="head"><div><h1>Chromebook Check v2.01</h1><div class="sub">診断を開きやすくした安定版</div></div><div class="pill">'+(idx===0?'待機':steps[idx])+'</div></div><div class="pi"><span>Step '+Math.min(idx,steps.length-1)+'/'+(steps.length-1)+'</span><span>'+steps[idx]+'</span></div><div class="prog"><div class="bar" style="width:'+pct+'%"></div></div><div class="content"><div class="main">'+main+'</div><div class="foot">'+(foot||'')+'</div></div></div>'}function render(){stopMedia();if(idx===0){frame('<div class="big">Chromebook Check</div><div class="center sub">端末情報を確認してから検査を開始します。</div><div class="grid"><div class="item"><div class="label">ChromeOS / ブラウザ</div><div class="value" id="specChrome">取得中...</div></div><div class="item"><div class="label">画面解像度</div><div class="value" id="specResolution">取得中...</div></div><div class="item"><div class="label">バッテリー</div><div class="value" id="specBattery">取得中...</div></div><div class="item"><div class="label">充電状態</div><div class="value" id="specCharging">取得中...</div></div><div class="item"><div class="label">ネットワーク</div><div class="value" id="specOnline">取得中...</div></div><div class="item"><div class="label">ストレージ</div><div class="value">system解析推奨</div></div></div><details><summary>chrome://system 解析</summary><div class="note">cpuinfo / meminfo / storage_info をExpand → Ctrl+A → Ctrl+C → 貼り付け</div><textarea id="systemPaste" placeholder="chrome://system の内容を貼り付け"></textarea><div class="center"><button class="btn start" onclick="parseSystemInfo()">解析</button></div><div class="grid"><div class="item"><div class="label">CPU</div><div class="value" id="parsedCpu">未解析</div></div><div class="item"><div class="label">メモリ</div><div class="value" id="parsedMem">未解析</div></div><div class="item"><div class="label">ストレージ</div><div class="value" id="parsedStorage">未解析</div></div></div></details>','<button class="btn start" onclick="next()">▶ 検査開始</button>');collectSpecs();return}if(idx===1){frame('<h2>標準診断 / キーボード</h2><div class="note">ボタンで <strong>chrome://diagnostics</strong> をコピーし、新しいタブを開きます。<br>新しいタブで <strong>Ctrl+V → Enter</strong> を押してください。</div><div class="diagnostic-url" onclick="copyDiagnosticsUrl()">chrome://diagnostics</div><div id="simpleKeyboardArea"></div>','<button class="btn start" onclick="openDiagnosticsHelper()">▶ 診断を開く準備</button><button class="btn warn" onclick="showSimpleKeyboard()">簡易検査</button><button class="btn ng" onclick="fail(\'キーボード\')">❌ NG</button><button class="btn ok" onclick="passStep(\'キーボード\')">✅ OK</button>');return}if(idx===2){frame('<h2>スピーカー</h2><div class="sub">左「ド・ソ・シ」→右「ド・ソ・シ」を短く再生します。</div><div class="speaker-box"><div class="speaker" id="leftSpeaker"><h2>左</h2><div class="tone" id="leftTone">待機</div></div><div class="speaker" id="rightSpeaker"><h2>右</h2><div class="tone" id="rightTone">待機</div></div></div>','<button class="btn start" onclick="playSpeakerTest()">▶ テスト開始</button><button class="btn ng" onclick="fail(\'スピーカー\')">❌ NG</button><button class="btn ok" onclick="passStep(\'スピーカー\')">✅ OK</button>');return}if(idx===3){frame('<h2>カメラ</h2><div class="sub">複数カメラがある場合は切り替えて確認してください。</div><div class="note" id="cameraInfo">カメラ未起動</div><video id="cameraPreview" class="preview" autoplay playsinline muted></video>','<button class="btn start" onclick="startCamera()">▶ 起動</button><button class="btn start" onclick="switchCamera()">🔁 切替</button><button class="btn ng" onclick="fail(\'カメラ\')">❌ NG</button><button class="btn ok" onclick="passStep(\'カメラ\')">✅ OK</button>');return}if(idx===4){frame('<h2>マイク</h2><div class="sub">声を出してメーターが反応するか確認します。</div><div class="meter"><div class="meter-bar" id="micBar"></div></div>','<button class="btn start" onclick="startMic()">▶ 起動</button><button class="btn ng" onclick="fail(\'マイク\')">❌ NG</button><button class="btn ok" onclick="passStep(\'マイク\')">✅ OK</button>');return}if(idx===5){frame('<h2>液晶＋タッチパネル</h2><div class="sub">全画面で色確認後、そのまま5か所タッチ検査へ進みます。</div>','<button class="btn start" onclick="startLcdTouch()">▶ 全画面開始</button><button class="btn ng" onclick="fail(\'液晶＋タッチ\')">❌ NG</button><button class="btn ok" onclick="passStep(\'液晶＋タッチ\')">✅ OK</button>');return}if(idx===6){frame('<h2>タッチパッド</h2><div class="sub">左クリック・右クリック・カーソル移動を確認します。</div><div class="click-area"><div class="click-box" id="leftClick">左クリック</div><div class="click-box" id="rightClick">右クリック</div></div><div class="target-area" onmousemove="checkPointer(event)" onclick="checkClick(event)" oncontextmenu="checkRightClick(event)"><div class="target" id="target">○</div></div><div class="note">黒いエリア内で左クリック・右クリック、カーソルを丸へ移動してください。</div>','<button class="btn ng" onclick="fail(\'タッチパッド\')">❌ NG</button><button class="btn ok" onclick="passStep(\'タッチパッド\')">✅ OK</button>');return}if(idx===7){let items=Object.entries(results).map(([k,v])=>'<div class="item"><div class="label">'+k+'</div><div class="value '+(v==='OK'?'pass':'fail')+'">'+v+'</div></div>').join('');frame('<div class="big pass">🎉 PASS</div><div class="center sub">検査完了</div><div class="grid">'+items+'</div>','<button class="btn start" onclick="location.reload()">次の端末</button>')}}function next(){idx++;render()}function passStep(n){results[n]='OK';next()}function fail(n){stopMedia();results[n]='NG';root().innerHTML='<div class="card"><div class="big fail">❌ FAIL</div><div class="center sub">'+n+' でNG判定</div><div class="foot"><button class="btn start" onclick="location.reload()">次の端末</button></div></div>'}async function collectSpecs(){let ua=navigator.userAgent||'',m=ua.match(/CrOS\s+([^\s]+)\s+([0-9.]+)/);setText('specChrome',m?'ChromeOS '+m[2]:'取得不可');setText('specResolution',screen.width+' × '+screen.height);setText('specOnline',navigator.onLine?'接続中':'未接続');if('getBattery'in navigator){try{let b=await navigator.getBattery();setText('specBattery',Math.round(b.level*100)+'%');setText('specCharging',b.charging?'充電中':'未充電')}catch(e){setText('specBattery','取得不可');setText('specCharging','取得不可')}}else{setText('specBattery','非対応');setText('specCharging','非対応')}}function setText(id,t){let e=document.getElementById(id);if(e)e.textContent=t}function parseSystemInfo(){let text=(document.getElementById('systemPaste')||{}).value||'',cm=text.match(/model name\s*:\s*(.+)/i),cpu=cm?cm[1].trim():'未検出';cpu=cpu.replace(/Intel\(R\)/g,'Intel').replace(/Celeron\(R\)/g,'Celeron').replace(/\s*CPU\s*@.+$/i,'').replace(/\s+/g,' ').trim();setText('parsedCpu',cpu||'未検出');let mm=text.match(/MemTotal:\s*([0-9]+)\s*kB/i),mem='未検出';if(mm){let gb=Number(mm[1])/1024/1024;if(gb<3)mem='2GB';else if(gb<6)mem='4GB';else if(gb<12)mem='8GB';else if(gb<24)mem='16GB';else mem=Math.round(gb)+'GB'}setText('parsedMem',mem);let storage='未検出',sm=text.match(/(?:SEC_COUNT|sector count|sectors|rel_sectors)\s*[:|]\s*([0-9]+)/i);if(sm){storage=normalizeStorage(Number(sm[1])*512/(1000**3))}else{let nm=text.match(/name\s*\|\s*([A-Za-z0-9_-]+)/i)||text.match(/name\s*:\s*([A-Za-z0-9_-]+)/i);if(nm)storage='型番: '+nm[1].trim()}setText('parsedStorage',storage)}function normalizeStorage(gb){if(gb<24)return'16GB';if(gb<48)return'32GB';if(gb<96)return'64GB';if(gb<192)return'128GB';if(gb<384)return'256GB';return Math.round(gb)+'GB'}async function openDiagnosticsHelper(){try{await navigator.clipboard.writeText('chrome://diagnostics')}catch(e){}let html=encodeURIComponent('<!doctype html><html><head><meta charset="utf-8"><title>診断を開く</title><style>body{font-family:sans-serif;background:#0f172a;color:white;text-align:center;padding:40px}h1{font-size:40px}.box{font-size:34px;background:#020617;border:2px dashed #93c5fd;padding:25px;border-radius:18px;margin:30px auto;max-width:700px}</style></head><body><h1>ChromeOS標準診断</h1><p>アドレスバーをクリックして</p><div class="box">Ctrl + V → Enter</div><p>貼り付けるURL：chrome://diagnostics</p></body></html>');window.open('data:text/html;charset=utf-8,'+html,'_blank')}async function copyDiagnosticsUrl(){try{await navigator.clipboard.writeText('chrome://diagnostics');alert('chrome://diagnostics をコピーしました')}catch(e){alert('コピーできない場合は手入力してください')}}function showSimpleKeyboard(){let area=document.getElementById('simpleKeyboardArea');if(!area)return;let rows=[['Esc','1','2','3','4','5','6','7','8','9','0','-','=','Backspace'],['Tab','Q','W','E','R','T','Y','U','I','O','P','[',']'],['A','S','D','F','G','H','J','K','L',';','\'','Enter'],['Shift','Z','X','C','V','B','N','M',',','.','/','Shift'],['Ctrl','Alt','Space','ArrowLeft','ArrowUp','ArrowDown','ArrowRight']];area.innerHTML='<div class="note">簡易検査：押したキーが緑になります。確認後OKを押してください。</div><div class="simple-kb" id="simpleKb"></div>';let kb=document.getElementById('simpleKb');rows.forEach(row=>{let div=document.createElement('div');div.className='simple-row';row.forEach(k=>{let key=document.createElement('div');key.className='simple-key';key.id='key-'+k;key.textContent=k.replace('ArrowLeft','←').replace('ArrowRight','→').replace('ArrowUp','↑').replace('ArrowDown','↓');div.appendChild(key)});kb.appendChild(div)})}document.addEventListener('keydown',e=>{if(idx!==1)return;let k=e.key.length===1?e.key.toUpperCase():e.key;if(e.code==='Space'||e.key===' ')k='Space';if(e.code==='Escape')k='Esc';if(e.key==='Control')k='Ctrl';let el=document.getElementById('key-'+k);if(el){el.classList.add('done');e.preventDefault()}});function wait(ms){return new Promise(r=>setTimeout(r,ms))}async function playTone(freq,pan,label,side){let AC=window.AudioContext||window.webkitAudioContext,ctx=new AC(),osc=ctx.createOscillator(),gain=ctx.createGain(),p=ctx.createStereoPanner?ctx.createStereoPanner():null;osc.frequency.value=freq;osc.type='sine';gain.gain.value=.42;if(p){p.pan.value=pan;osc.connect(gain).connect(p).connect(ctx.destination)}else osc.connect(gain).connect(ctx.destination);setText(side+'Tone',label);let sp=document.getElementById(side+'Speaker');if(sp)sp.classList.add('active');osc.start();await wait(260);osc.stop();ctx.close();if(sp)sp.classList.remove('active')}async function playSpeakerTest(){let notes=[[261.63,'ド'],[392,'ソ'],[493.88,'シ']];setText('leftTone','待機');setText('rightTone','待機');for(let n of notes){await playTone(n[0],-1,n[1],'left');await wait(70)}setText('leftTone','完了');await wait(130);for(let n of notes){await playTone(n[0],1,n[1],'right');await wait(70)}setText('rightTone','完了')}async function refreshCameraDevices(){try{let d=await navigator.mediaDevices.enumerateDevices();cameraDevices=d.filter(x=>x.kind==='videoinput')}catch(e){cameraDevices=[]}}async function startCamera(deviceId){try{stopMedia();await refreshCameraDevices();let constraints={video:deviceId?{deviceId:{exact:deviceId}}:true,audio:false};cameraStream=await navigator.mediaDevices.getUserMedia(constraints);let video=document.getElementById('cameraPreview');if(video){video.srcObject=cameraStream;video.style.display='block'}await refreshCameraDevices();let label=cameraDevices[cameraIndex]&&cameraDevices[cameraIndex].label?cameraDevices[cameraIndex].label:'カメラ '+(cameraIndex+1);setText('cameraInfo','使用中: '+label+' / 検出数: '+(cameraDevices.length||'不明'))}catch(e){alert('カメラを起動できません: '+e.message)}}async function switchCamera(){await refreshCameraDevices();if(cameraDevices.length<=1){alert('切替可能なカメラが見つかりません');return}cameraIndex=(cameraIndex+1)%cameraDevices.length;await startCamera(cameraDevices[cameraIndex].deviceId)}async function startMic(){try{micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});let AC=window.AudioContext||window.webkitAudioContext;micCtx=new AC();let source=micCtx.createMediaStreamSource(micStream),analyser=micCtx.createAnalyser();source.connect(analyser);let data=new Uint8Array(analyser.frequencyBinCount);function loop(){if(idx!==4)return;analyser.getByteFrequencyData(data);let avg=data.reduce((a,b)=>a+b,0)/data.length,bar=document.getElementById('micBar');if(bar)bar.style.width=Math.min(100,avg*2)+'%';requestAnimationFrame(loop)}loop()}catch(e){alert('マイクを起動できません: '+e.message)}}function stopMedia(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}if(micCtx){micCtx.close();micCtx=null}}async function requestFS(el){try{if(el.requestFullscreen)await el.requestFullscreen();else if(el.webkitRequestFullscreen)await el.webkitRequestFullscreen()}catch(e){}}async function exitFS(){try{if(document.fullscreenElement&&document.exitFullscreen)await document.exitFullscreen();else if(document.webkitFullscreenElement&&document.webkitExitFullscreen)await document.webkitExitFullscreen()}catch(e){}}let lcdMode='color',lcdIndex=0,touched=new Set();const colors=[['WHITE','white','black'],['BLACK','black','white'],['RED','red','white'],['GREEN','lime','black'],['BLUE','blue','white']];function startLcdTouch(){let fs=document.getElementById('fs');if(!fs){fs=document.createElement('div');fs.id='fs';fs.className='fullscreen';fs.innerHTML='<div class="fs-top"><div class="fs-title" id="fsTitle">液晶色テスト</div><button class="btn ng" onclick="closeFs(event)">閉じる</button></div><div class="fs-body" id="fsBody">WHITE</div>';document.body.appendChild(fs);fs.addEventListener('click',advanceLcd)}lcdMode='color';lcdIndex=0;touched=new Set();fs.classList.add('show');renderLcd();requestFS(fs)}function renderLcd(){let fs=document.getElementById('fs'),title=document.getElementById('fsTitle'),body=document.getElementById('fsBody');if(lcdMode==='color'){let c=colors[lcdIndex];fs.style.background=c[1];fs.style.color=c[2];title.textContent='液晶色テスト';body.className='fs-body';body.textContent=c[0]}else{fs.style.background='#020617';fs.style.color='white';title.textContent='タッチパネル検査：5か所タッチ';body.className='';body.innerHTML='<div class="touch-dot tl" data-touch="tl">左上</div><div class="touch-dot tr" data-touch="tr">右上</div><div class="touch-dot c" data-touch="c">中央</div><div class="touch-dot bl" data-touch="bl">左下</div><div class="touch-dot br" data-touch="br">右下</div>';body.querySelectorAll('[data-touch]').forEach(dot=>{dot.onpointerdown=e=>markTouch(e,dot);dot.ontouchstart=e=>markTouch(e,dot)})}}function advanceLcd(e){if(e.target.classList.contains('ng')||e.target.dataset.touch)return;if(lcdMode!=='color')return;lcdIndex++;if(lcdIndex>=colors.length)lcdMode='touch';renderLcd()}function markTouch(e,dot){e.preventDefault();dot.classList.add('hit');touched.add(dot.dataset.touch);if(touched.size===5&&idx===5){results['液晶＋タッチ']='OK';setTimeout(()=>{closeFs();next()},500)}}function closeFs(e){if(e)e.stopPropagation();let fs=document.getElementById('fs');if(fs)fs.classList.remove('show');exitFS()}function checkClick(e){let el=document.getElementById('leftClick');if(el)el.classList.add('done')}function checkRightClick(e){e.preventDefault();let el=document.getElementById('rightClick');if(el)el.classList.add('done')}function checkPointer(e){let target=document.getElementById('target');if(!target)return;let r=target.getBoundingClientRect();if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){target.classList.add('hit');target.textContent='OK'}}window.next=next;window.passStep=passStep;window.fail=fail;window.parseSystemInfo=parseSystemInfo;window.openDiagnosticsHelper=openDiagnosticsHelper;window.copyDiagnosticsUrl=copyDiagnosticsUrl;window.showSimpleKeyboard=showSimpleKeyboard;window.playSpeakerTest=playSpeakerTest;window.startCamera=startCamera;window.switchCamera=switchCamera;window.startMic=startMic;window.startLcdTouch=startLcdTouch;window.closeFs=closeFs;window.checkPointer=checkPointer;window.checkClick=checkClick;window.checkRightClick=checkRightClick;render();})();
