<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chromebook Check v1.2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="card">
    <div class="header">
      <div>
        <h1>Chromebook Check v1.2</h1>
        <div class="sub">順番に検査 / OK・NGだけ / ログ保存なし / 画面/タッチパネル全画面対応</div>
      </div>
      <div class="pill" id="statusPill">待機</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-info">
        <span id="stepText">Step 0/7</span>
        <span id="stepName">開始</span>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
    </div>

    <div class="stage" id="content"></div>
  </div>
</div>

<div id="colorScreen" class="color-screen">
  <button class="color-close" onclick="closeColor(event)">閉じる</button>
  <div id="colorLabel">WHITE</div>
</div>

<script src="app.js"></script>
</body>
</html>
